name: Docker

permissions: {}

on:
  push:
    tags: ["v*"]
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: Image channel to publish
        required: true
        type: choice
        options:
          - nightly
          - commit
        default: nightly

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  build:
    if: github.repository == 'gakonst/nanocodex'
    name: build and push multi-architecture image
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - name: Extract OCI labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Select image tags and build version
        id: params
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"
          if [[ "$GITHUB_EVENT_NAME" == push ]]; then
            tag_name="$GITHUB_REF_NAME"
            verify_tag="$GITHUB_REF_NAME"
            tags="${image}:${GITHUB_REF_NAME},${image}:latest"
          elif [[ "$GITHUB_EVENT_NAME" == schedule || "${{ inputs.channel }}" == nightly ]]; then
            tag_name=nightly
            verify_tag=nightly
            tags="${image}:nightly,${image}:nightly-${GITHUB_SHA}"
          else
            tag_name=dev
            verify_tag="$GITHUB_SHA"
            tags="${image}:${GITHUB_SHA}"
          fi
          {
            printf 'tag_name=%s\n' "$tag_name"
            printf 'verify_tag=%s\n' "$verify_tag"
            printf 'tags=%s\n' "$tags"
          } >> "$GITHUB_OUTPUT"
      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: harbor_adapter/nanocodex.Dockerfile
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.params.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CARGO_PROFILE=maxperf
            TAG_NAME=${{ steps.params.outputs.tag_name }}
            VERGEN_GIT_SHA=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify the published manifest
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          TAG_NAME: ${{ steps.params.outputs.verify_tag }}
        shell: bash
        run: docker buildx imagetools inspect "${IMAGE}:${TAG_NAME}"
