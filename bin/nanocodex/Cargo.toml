[package]
name = "nanocodex-bin"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
publish = false
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Daily-driver TUI and headless JSONL adapter for Nanocodex"
build = "build.rs"

[dependencies]
arboard.workspace = true
base64.workspace = true
alloy-transport-mpp = { version = "=0.2.0", git = "https://github.com/tempoxyz/mpp-rs", rev = "db5a3e3ac4c40d04158538a0c0cd38c888b33ef1" }
clap.workspace = true
crossterm.workspace = true
dotenvy.workspace = true
eyre.workspace = true
futures-util.workspace = true
image.workspace = true
nanocodex.workspace = true
nanocodex-observability.workspace = true
pulldown-cmark.workspace = true
mpp = { version = "=0.11.0", git = "https://github.com/tempoxyz/mpp-rs", rev = "db5a3e3ac4c40d04158538a0c0cd38c888b33ef1", default-features = false, features = ["tempo", "ws", "sqlite", "reqwest-rustls-tls"] }
mpp-egress.workspace = true
ratatui.workspace = true
reqwest = { workspace = true, features = ["blocking"] }
self-replace.workspace = true
semver.workspace = true
serde.workspace = true
serde_json.workspace = true
syntect.workspace = true
two-face.workspace = true
sha2.workspace = true
shlex.workspace = true
tempfile.workspace = true
tokio = { workspace = true, features = ["fs", "io-util", "macros", "net", "process", "rt-multi-thread", "sync", "time"] }
tokio-tungstenite.workspace = true
tracing.workspace = true
unicode-segmentation.workspace = true
unicode-width.workspace = true

[build-dependencies]
chrono.workspace = true
vergen = { workspace = true, features = ["build", "git", "gitcl"] }

[dev-dependencies]
criterion.workspace = true
nanocodex-tools.workspace = true
tokio-tungstenite.workspace = true

[[bench]]
name = "tui_render"
harness = false

[[bin]]
name = "nanocodex"
path = "src/main.rs"
doc = false

[lints]
workspace = true
